<script>
setTimeout(function() {
  if (document.hidden) return;
  // Deduplicate: one hit per page per 12 hours
  var key = "hit:" + location.pathname;
  var last = localStorage.getItem(key);
  if (last && (Date.now() - parseInt(last, 10)) < 43200000) return;
  localStorage.setItem(key, Date.now().toString());
  fetch("https://thinking-in-r.netlify.app/api/hit?p=" + encodeURIComponent(location.pathname));
}, 5000);
</script>
